<!-- Step 1: fetch Google Sheets BEFORE React loads -->
<script>
var SHEET_ID = "1RePMssY4C3Pz8NFOccRvPMsb35gYIAyJCytKkFzjsTI";
var TARGET_DAYS = 30, MIN_DAYS = 15, PLAN_START = "2026-03-12";

function gsheetCSV(sheet) {
  return "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
         "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(sheet);
}

function parseCSV(text) {
  var lines = text.trim().split("\n");
  var hdrs = lines[0].split(",").map(function(h){ return h.replace(/^"|"$/g,"").trim(); });
  return lines.slice(1).map(function(line){
    var cols=[], cur="", inQ=false;
    for(var i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=line[i];
    }
    cols.push(cur.trim());
    var row={};
    hdrs.forEach(function(h,i){row[h]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
    return row;
  }).filter(function(r){return r[hdrs[0]];});
}

function buildData(invText, ordText) {
  var invRows = parseCSV(invText);
  var ordRows = parseCSV(ordText);

  var baseInv = invRows.map(function(r){
    var dem = parseInt(r.avg_daily_demand)||1;
    return {
      sku: r.sku, country: r.country, treatment: r.treatment,
      line: r.packaging_line, onHand: parseInt(r.on_hand_units)||0,
      avgDemand: dem, target: dem*TARGET_DAYS, warning: dem*MIN_DAYS
    };
  }).filter(function(r){return r.sku;});

  var seen = {};
  var orders = [];
  ordRows.forEach(function(r){
    if(!r.order_line_id) return;
    var inc = parseInt(r.include_in_projection)||0;
    if(!seen[r.order_line_id] || inc > seen[r.order_line_id]) {
      seen[r.order_line_id] = inc;
      var existing = orders.findIndex(function(o){return o.id===r.order_line_id;});
      var obj = {
        id: r.order_line_id, country: r.country, treatment: r.treatment,
        sku: r.sku, line: r.packaging_line,
        packDate: (r.pack_date||PLAN_START).slice(0,10),
        qty: parseInt(r.qty_units)||0, status: r.status||"Planned",
        notes: r.notes||"", include: inc, userCreated: false
      };
      if(existing>=0) orders[existing]=obj; else orders.push(obj);
    }
  });
  return {baseInv: baseInv, orders: orders};
}

// Kick off fetch immediately
window._vmiLoaded = false;
window._vmiData = null;
window._vmiCallbacks = [];

Promise.all([
  fetch(gsheetCSV("Inventory")).then(function(r){return r.text();}),
  fetch(gsheetCSV("Orders")).then(function(r){return r.text();})
]).then(function(results){
  window._vmiData = buildData(results[0], results[1]);
  window._vmiLoaded = true;
  window._vmiCallbacks.forEach(function(cb){cb(window._vmiData);});
}).catch(function(e){
  console.warn("Sheets fetch failed:", e);
  window._vmiLoaded = true;
  window._vmiCallbacks.forEach(function(cb){cb(null);});
});

window.vmiOnLoad = function(cb) {
  if(window._vmiLoaded) cb(window._vmiData);
  else window._vmiCallbacks.push(cb);
};

window.vmiReload = function(cb) {
  window._vmiLoaded = false;
  window._vmiData = null;
  Promise.all([
    fetch(gsheetCSV("Inventory")).then(function(r){return r.text();}),
    fetch(gsheetCSV("Orders")).then(function(r){return r.text();})
  ]).then(function(results){
    window._vmiData = buildData(results[0], results[1]);
    window._vmiLoaded = true;
    cb(window._vmiData);
  }).catch(function(){cb(null);});
};
</script>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function d2n(s){return Math.floor(new Date(s+"T12:00:00Z").getTime()/86400000);}
function n2d(n){return new Date(n*86400000).toISOString().split("T")[0];}
var START_N=d2n(PLAN_START);
function dayOffset(ds){return d2n(ds)-START_N;}
function offsetToDate(off){return n2d(START_N+off);}
function addDays(ds,n){var d=new Date(ds+"T12:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.toISOString().split("T")[0];}
function fmtDate(ds){return new Date(ds+"T12:00:00Z").toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function prodDays(qty,line){return Math.max(1,Math.ceil(qty/(LINE_CAPS[line]||3000)));}
function packEnd(o){return dayOffset(o.packDate)+prodDays(o.qty,o.line)-1;}
function receiptOffset(o){return packEnd(o)+TRANSIT_DAYS+1;}
function receiptDate(o){return offsetToDate(receiptOffset(o));}
function calcStatus(oh,base){
  var d=base.avgDemand>0?oh/base.avgDemand:0;
  if(oh<=0)return"Stockout";
  if(d<MIN_DAYS)return"Low Stock";
  if(d>MAX_DAYS)return"Overstock";
  return"Healthy";
}
function willStockout(base,orders){
  var rel=orders.filter(function(o){return o.sku===base.sku&&o.include&&o.status!=="On Hold";});
  var stock=base.onHand;
  for(var i=0;i<PLAN_DAYS;i++){
    var rec=rel.filter(function(o){return receiptOffset(o)===i;}).reduce(function(s,o){return s+o.qty;},0);
    stock=stock+rec-base.avgDemand;
    if(stock<=0)return true;
  }
  return false;
}
function nextId(orders){
  var ns=orders.map(function(o){return parseInt(o.id.replace("OL-",""));}).filter(function(n){return!isNaN(n);});
  return"OL-"+(Math.max.apply(null,[0].concat(ns))+1);
}
function buildProjection(base,orders){
  var rel=orders.filter(function(o){return o.sku===base.sku&&o.include&&o.status!=="On Hold";});
  var stock=base.onHand;
  return Array.from({length:PLAN_DAYS},function(_,i){
    var rec=rel.filter(function(o){return receiptOffset(o)===i;}).reduce(function(s,o){return s+o.qty;},0);
    var opening=stock;
    stock=Math.max(0,stock+rec-base.avgDemand);
    return{day:i,date:offsetToDate(i),opening:opening,receipts:rec,demand:base.avgDemand,closing:stock};
  });
}
function computeLoad(orders){
  var load={};
  orders.forEach(function(o){
    var s=dayOffset(o.packDate),days=prodDays(o.qty,o.line),daily=o.qty/days;
    for(var i=0;i<days;i++){var k=o.line+":+"+(s+i);load[k]=(load[k]||0)+daily;}
  });
  return load;
}

function ProjSparkline(props){
  var rows=props.rows,base=props.base,W=props.width||340,H=props.height||70;
  if(!rows||!rows.length)return null;
  var vals=rows.map(function(r){return r.closing;});
  var mx=Math.max.apply(null,vals.concat([base.target]))*1.1;
  function px(i){return(i/(rows.length-1))*W;}
  function py(v){return H-(v/mx)*H;}
  return <svg width={W} height={H} style={{overflow:"visible",display:"block"}}>
    <line x1={0} y1={py(base.target)} x2={W} y2={py(base.target)} stroke="#22c55e" strokeWidth={1} strokeDasharray="3,3" opacity={0.6}/>
    <line x1={0} y1={py(base.warning)} x2={W} y2={py(base.warning)} stroke="#f97316" strokeWidth={1} strokeDasharray="2,3" opacity={0.5}/>
    {rows.map(function(r,i){return r.receipts>0?<line key={i} x1={px(i)} y1={H} x2={px(i)} y2={py(r.closing)} stroke="#22c55e" strokeWidth={2} opacity={0.35}/>:null;})}
    <polyline points={vals.map(function(v,i){return px(i)+","+py(v);}).join(" ")} fill="none" stroke="#38bdf8" strokeWidth={2}/>
    {rows.map(function(r,i){return r.closing<=base.warning?<circle key={i} cx={px(i)} cy={py(r.closing)} r={2.5} fill="#ef4444"/>:null;})}
  </svg>;
}

        {days.map(function(i){var ds=offsetToDate(i),d=new Date(ds+"T12:00:00Z"),we=d.getUTCDay()===0||d.getUTCDay()===6;return <div key={i} style={{width:DAY_W,flexShrink:0,textAlign:"center",fontSize:9,color:i===0?"#38bdf8":we?"#334155":"#4a6080",borderLeft:"1px solid #0f1a2e",padding:"3px 0"}}>{i%2===0&&<span>{d.getUTCDate()}</span>}</div>;})}

    var btnBorder=isStockout?"#ef444444":"#2563eb44";
    return <div style={{background:"#080e1c",border:"1px solid "+borderCol,borderRadius:8,padding:"12px 14px",flex:"1 1 200px",minWidth:200}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <span style={{fontSize:13,fontWeight:800,fontFamily:"Courier New,monospace"}}>{i.sku}</span>
        <StatusBadge status={i.status} small={true}/>
      </div>
      <div style={{fontSize:10,color:"#4a6080",marginBottom:6}}>{COUNTRIES[i.country]} · {i.treatment} · <b style={{color:isStockout?"#ef4444":"#f97316"}}>{dc}d cover{i.futureStockout?" · hits zero in "+dc+"d":""}</b></div>
      <StockBar value={i.onHand} target={i.target} warning={i.warning} width="100%"/>
      <div style={{fontSize:10,color:"#64748b",marginTop:5,display:"flex",justifyContent:"space-between",fontFamily:"Courier New,monospace"}}>
        <span>On hand: <b style={{color:"#e2e8f0"}}>{i.onHand.toLocaleString()}</b></span>
        <span>Target: <b style={{color:"#22c55e"}}>{i.target.toLocaleString()}</b></span>
      </div>
      <button onClick={function(){onCreateOrder({country:i.country,treatment:i.treatment,qty:String(suggested),notes:(isStockout?"🚨 STOCKOUT":"⚠ LOW STOCK")+" — "+i.sku+" at "+dc+"d. Order "+suggested.toLocaleString()+" units."});}} style={{marginTop:9,width:"100%",background:btnBg,border:"1px solid "+btnBorder,color:btnCol,padding:"6px 0",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>
        {isStockout?"🚨":"+"} Order {suggested.toLocaleString()} units
      </button>
    </div>;
  }
  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
      {kpis.map(function(k){return <div key={k.l} style={{background:k.bg,border:"1px solid "+k.c+"2a",borderRadius:8,padding:"12px 18px",flex:"1 1 100px"}}>
        <div style={{fontSize:9,color:"#4a6080",fontWeight:700,textTransform:"uppercase",marginBottom:5}}>{k.l}</div>
        <div style={{fontSize:28,fontWeight:800,color:k.c,fontFamily:"Courier New,monospace"}}>{k.v}</div>
      </div>;})}
    </div>
    {stockouts.length>0&&<div style={{background:"#0b1221",border:"1px solid #ef444440",borderRadius:10,overflow:"hidden"}}>
      <div style={{background:"#1a0505",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #2b0d0d"}}>
        <span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>🚨 {stockouts.length} STOCKOUT — URGENT ACTION REQUIRED</span>
        <button onClick={function(){onCreateOrder(null);}} style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Emergency Order</button>
      </div>
      <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
        {stockouts.map(function(i){return <AlertCard key={i.sku} item={i}/>;}) }
      </div>
    </div>}
    {lowstock.length>0&&<div style={{background:"#0b1221",border:"1px solid #f9731630",borderRadius:10,overflow:"hidden"}}>
      <div style={{background:"#12080a",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a2030"}}>
        <span style={{fontSize:11,color:"#f97316",fontWeight:700}}>⚠ {lowstock.length} SKUs BELOW {MIN_DAYS}-DAY MINIMUM</span>
        <button onClick={function(){onCreateOrder(null);}} style={{background:"linear-gradient(135deg,#dc2626,#7c3aed)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Create Order</button>
      </div>
      <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
        {lowstock.map(function(i){return <AlertCard key={i.sku} item={i}/>;}) }
      </div>
    </div>}
    {overstock.length>0&&<div style={{background:"#0b1221",border:"1px solid #eab30830",borderRadius:10,overflow:"hidden"}}>
      <div style={{background:"#0e0e06",padding:"10px 16px",borderBottom:"1px solid #1a1a0a"}}>
        <span style={{fontSize:11,color:"#eab308",fontWeight:700}}>📦 {overstock.length} SKUs ABOVE {MAX_DAYS}-DAY MAXIMUM</span>
      </div>
      <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
        {overstock.map(function(i){var dc=Math.round(i.onHand/i.avgDemand),excess=i.onHand-i.avgDemand*MAX_DAYS;
          return <div key={i.sku} style={{background:"#080e1c",border:"1px solid #eab30830",borderRadius:8,padding:"12px 14px",flex:"1 1 200px",minWidth:200}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:13,fontWeight:800,fontFamily:"Courier New,monospace"}}>{i.sku}</span>
              <StatusBadge status="Overstock" small={true}/>
            </div>
            <div style={{fontSize:10,color:"#4a6080"}}>{COUNTRIES[i.country]} · {i.treatment} · <b style={{color:"#eab308"}}>{dc}d cover</b> · excess: {excess.toLocaleString()} units</div>
          </div>;
        })}
      </div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
      {Object.entries(COUNTRIES).map(function(e){
        var code=e[0],name=e[1];
        var inv=inventory.filter(function(i){return i.country===code;});
        var al=inv.filter(function(i){return i.status==="Low Stock"||i.status==="Stockout";}).length;
        var ov=inv.filter(function(i){return i.status==="Overstock";}).length;
        var total=inv.reduce(function(s,i){return s+i.onHand;},0);
        var avgDos=inv.length>0?Math.round(inv.reduce(function(s,i){return s+i.onHand/i.avgDemand;},0)/inv.length):0;
        return <div key={code} style={{background:"#0b1221",border:"1px solid "+(al>0?"#f9731630":ov>0?"#eab30830":"#1a2740"),borderRadius:8,padding:"12px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <div><div style={{fontSize:19,fontWeight:800,fontFamily:"Courier New,monospace"}}>{code}</div><div style={{fontSize:10,color:"#4a6080"}}>{name}</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
              {al>0&&<span style={{background:"#f9731615",color:"#f97316",border:"1px solid #f9731630",borderRadius:4,fontSize:9,fontWeight:700,padding:"2px 6px"}}>{al}⚠</span>}
              {ov>0&&<span style={{background:"#eab30815",color:"#eab308",border:"1px solid #eab30830",borderRadius:4,fontSize:9,fontWeight:700,padding:"2px 6px"}}>{ov}↑</span>}
            </div>
          </div>
          <div style={{fontSize:10,color:"#64748b"}}>On hand: <b style={{color:"#e2e8f0",fontFamily:"Courier New,monospace"}}>{total.toLocaleString()}</b></div>
          <div style={{fontSize:10,color:"#64748b"}}>Avg cover: <b style={{color:avgDos<MIN_DAYS?"#f97316":avgDos>MAX_DAYS?"#eab308":"#22c55e",fontFamily:"Courier New,monospace"}}>{avgDos}d</b></div>
        </div>;
      })}
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
var TABS=[{id:"dashboard",label:"Dashboard",icon:"◈"},{id:"planning",label:"Planning",icon:"▦"},{id:"projection",label:"Projection",icon:"∿"},{id:"orders",label:"Orders",icon:"⊞"}];

function App(){
  var tabState=_useState("dashboard"),tab=tabState[0],setTab=tabState[1];
  var ordState=_useState(FALLBACK_ORDERS),orders=ordState[0],setOrders=ordState[1];
  var invState=_useState(FALLBACK_INV),baseInv=invState[0],setBaseInv=invState[1];
  var modalState=_useState(false),modal=modalState[0],setModal=modalState[1];
  var prefillState=_useState(null),prefill=prefillState[0],setPrefill=prefillState[1];
  var toastState=_useState(null),toast=toastState[0],setToast=toastState[1];
  var ganttState=_useState(null),ganttSel=ganttState[0],setGanttSel=ganttState[1];
  var loadingState=_useState(true),loading=loadingState[0],setLoading=loadingState[1];
  var srcState=_useState("fallback"),dataSource=srcState[0],setDataSource=srcState[1];

  var inventory=_useMemo(function(){
    return baseInv.map(function(base){
      var extra=orders.filter(function(o){return o.sku===base.sku&&o.userCreated&&o.include&&o.status!=="On Hold";}).reduce(function(s,o){return s+o.qty;},0);
      var oh=base.onHand+extra;
      var baseWithOH=Object.assign({},base,{onHand:oh});
      var snapStatus=calcStatus(oh,base);
      var futureStockout=snapStatus!=="Overstock"&&snapStatus!=="Stockout"&&willStockout(baseWithOH,orders);
      var status=futureStockout?"Stockout":snapStatus;
      return Object.assign({},baseWithOH,{status:status,futureStockout:futureStockout});
    });
  },[baseInv,orders]);

  _useEffect(function(){
    window.vmiOnLoad(function(data){
      if(data&&data.baseInv&&data.baseInv.length>0){
        setBaseInv(data.baseInv);
        setOrders(data.orders);
        setDataSource("google_sheets");
        setToast("✓ Live data loaded from Google Sheets");
        setTimeout(function(){setToast(null);},3000);
      } else {
        setToast("⚠ Using built-in demo data");
        setTimeout(function(){setToast(null);},4000);
      }
      setLoading(false);
    });
  },[]);

  var newCount=orders.filter(function(o){return o.userCreated;}).length;
  function openModal(pf){setPrefill(pf||null);setModal(true);}
  function handleSubmit(order){setOrders(function(p){return[order].concat(p);});setToast("✓ "+order.id+" created");setTimeout(function(){setToast(null);},5000);}
  function handleMove(oid,newDate){setOrders(function(p){return p.map(function(o){return o.id!==oid?o:Object.assign({},o,{packDate:newDate});});});setToast("↔ "+oid+" rescheduled");setTimeout(function(){setToast(null);},4000);}
  function handleDelete(oid){
    if(oid==="ALL"){setOrders(function(p){return p.filter(function(o){return!o.userCreated;});});setToast("🗑 All planner orders removed");}
    else{setOrders(function(p){return p.filter(function(o){return o.id!==oid;});});setToast("🗑 "+oid+" deleted");}
    setTimeout(function(){setToast(null);},4000);
  }
  function handleReload(){window.vmiReload(function(data){
    if(data&&data.baseInv&&data.baseInv.length>0){
      setBaseInv(data.baseInv);
      setOrders(function(p){return data.orders.concat(p.filter(function(o){return o.userCreated;}));});
      setDataSource("google_sheets");
      setToast("✓ Plan reloaded from Google Sheets");
    } else {setToast("⚠ Reload failed — check sharing settings");}
    setTimeout(function(){setToast(null);},4000);
  });}

  if(loading) return <div style={{minHeight:"100vh",background:"#060c18",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
    <div style={{width:36,height:36,border:"3px solid #1a2740",borderTop:"3px solid #3b82f6",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{color:"#4a6080",fontSize:13}}>Loading plan from Google Sheets…</div>
  </div>;

  return <div style={{minHeight:"100vh",background:"#060c18",color:"#e2e8f0"}}>
    {toast&&<div style={{position:"fixed",bottom:24,right:24,zIndex:300,background:"#052010",border:"1px solid #4ade8040",borderRadius:8,padding:"12px 18px",fontSize:12,color:"#4ade80",fontWeight:700,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",maxWidth:420}}>{toast}</div>}
    <div style={{background:"#080e1c",borderBottom:"1px solid #1a2740",padding:"0 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
      <div style={{padding:"12px 0",display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:26,height:26,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>⬡</div>
        <div>
          <div style={{fontSize:12,fontWeight:800}}>VMI Control Tower</div>
          <div style={{fontSize:8,color:"#334155",fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Insulin Supply Chain · {MIN_DAYS}/{TARGET_DAYS}/{MAX_DAYS}d Policy</div>
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginLeft:12}}>
        {TABS.map(function(t){return <button key={t.id} onClick={function(){setTab(t.id);}} style={{background:tab===t.id?"#0b1221":"none",border:"none",color:tab===t.id?"#e2e8f0":"#4a6080",padding:"12px 14px",fontSize:11,fontWeight:tab===t.id?700:500,cursor:"pointer",borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
          <span style={{opacity:0.7}}>{t.icon}</span>{t.label}
          {t.id==="orders"&&newCount>0&&<span style={{background:"#22c55e",color:"#000",borderRadius:10,fontSize:8,fontWeight:800,padding:"1px 5px"}}>{newCount}</span>}
        </button>;})}
      </div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={handleReload} style={{background:"#0b1221",border:"1px solid #1a2740",color:"#4a6080",padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↺ Reload</button>
        <span style={{fontSize:9,color:dataSource==="google_sheets"?"#22c55e":"#4a6080",fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:dataSource==="google_sheets"?"#22c55e":"#4a6080",display:"inline-block"}}/>{dataSource==="google_sheets"?"Live":"Demo"}
        </span>
        <button onClick={function(){openModal(null);}} style={{background:"linear-gradient(135deg,#1d4ed8,#4f46e5)",border:"none",color:"#fff",padding:"7px 18px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Create Order</button>
        <div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px #22c55e"}}/>
      </div>
    </div>
    <div style={{padding:20}}>
      {tab==="dashboard"&&<Dashboard inventory={inventory} orders={orders} onCreateOrder={openModal}/>}
      {tab==="orders"&&<OrdersView orders={orders} onCreateOrder={openModal} onDeleteOrder={handleDelete}/>}
      {tab==="projection"&&<ProjectionView orders={orders} baseInv={baseInv}/>}
      {tab==="planning"&&<div style={{display:"flex",flexDirection:"column",gap:20}}>
        <GanttBoard orders={orders} onMove={handleMove} onSelect={setGanttSel} selectedId={ganttSel}/>
        {ganttSel&&(function(){
          var sel=orders.find(function(o){return o.id===ganttSel;});
          if(!sel)return null;
          var base=baseInv.find(function(b){return b.sku===sel.sku;});
          if(!base)return null;
          var rows=buildProjection(base,orders);
          return <div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:10,padding:18}}>
            <div style={{fontSize:12,fontWeight:800,color:TREAT_COLOR[sel.treatment]||"#38bdf8",marginBottom:12,fontFamily:"Courier New,monospace"}}>{sel.id} — {sel.sku}</div>
            <ProjSparkline rows={rows} base={base} width={Math.max(500,PLAN_DAYS*22)} height={80}/>
          </div>;
        })()}
      </div>}
    </div>
    {modal&&<CreateOrderModal onClose={function(){setModal(false);}} onSubmit={handleSubmit} orders={orders} inventory={inventory} prefill={prefill}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
