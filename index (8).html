<!-- Plain JS fetch — runs before Babel, stores data in window.VMI_PRELOAD -->
<script>
(function(){
  var SHEET_ID = "1BaGY0XkklZG6hsDDnod1pRzy4Zxwuzh3Gt8CbNkVxLA";
  var MIN_DAYS=15, MAX_DAYS=45, TARGET_DAYS=30, PLAN_START="2026-03-12";

  function sheetUrl(sheet){
    return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(sheet);
  }

  function parseCSV(text){
    var lines=text.trim().split("\n");
    var headers=lines[0].split(",").map(function(h){return h.replace(/^"|"$/g,"").trim();});
    return lines.slice(1).map(function(line){
      var cols=[],cur="",inQ=false;
      for(var i=0;i<line.length;i++){
        if(line[i]==='"'){inQ=!inQ;}
        else if(line[i]===','&&!inQ){cols.push(cur.trim());cur="";}
        else cur+=line[i];
      }
      cols.push(cur.trim());
      var row={};
      headers.forEach(function(h,i){row[h]=(cols[i]||"").replace(/^"|"$/g,"").trim();});
      return row;
    }).filter(function(r){return Object.values(r).some(function(v){return v;});});
  }

  // Start fetching immediately — store promise in global
  window.VMI_PRELOAD = Promise.all([
    fetch(sheetUrl("Inventory")).then(function(r){return r.text();}),
    fetch(sheetUrl("Orders")).then(function(r){return r.text();})
  ]).then(function(results){
    var invRows=parseCSV(results[0]);
    var ordRows=parseCSV(results[1]);
    var baseInv=invRows.map(function(r){
      var dem=parseInt(r.avg_daily_demand)||1;
      return{sku:r.sku,country:r.country,treatment:r.treatment,line:r.packaging_line,
             onHand:parseInt(r.on_hand_units)||0,avgDemand:dem,
             target:dem*TARGET_DAYS,warning:dem*MIN_DAYS};
    }).filter(function(r){return r.sku;});
    var ordMap={};
    ordRows.forEach(function(r){
      if(!r.order_line_id)return;
      var inc=parseInt(r.include_in_projection)||0;
      var ex=ordMap[r.order_line_id];
      if(!ex||inc>(parseInt(ex.include_in_projection)||0))ordMap[r.order_line_id]=r;
    });
    var orders=Object.values(ordMap).map(function(r){
      return{id:r.order_line_id,country:r.country,treatment:r.treatment,sku:r.sku,
             line:r.packaging_line,packDate:(r.pack_date||PLAN_START).slice(0,10),
             qty:parseInt(r.qty_units)||0,status:r.status||"Planned",
             notes:r.notes||"",include:parseInt(r.include_in_projection)||0,userCreated:false};
    });
    if(baseInv.length===0)throw new Error("empty");
    return{baseInv:baseInv,orders:orders};
  }).catch(function(e){
    console.warn("Sheets fetch failed:",e);
    return null;
  });
})();
</script>

// ── HELPERS ──────────────────────────────────────────────────────────────────
const d2n=s=>Math.floor(new Date(s+"T12:00:00Z").getTime()/86400000);
const n2d=n=>new Date(n*86400000).toISOString().split("T")[0];
const START_N=d2n(PLAN_START);
const dayOffset=ds=>d2n(ds)-START_N;
const offsetToDate=off=>n2d(START_N+off);
const prodDays=(qty,line)=>Math.max(1,Math.ceil(qty/(LINE_CAPS[line]||3000)));
const packEnd=o=>dayOffset(o.packDate)+prodDays(o.qty,o.line)-1;
const receiptOffset=o=>packEnd(o)+TRANSIT_DAYS+1;
const receiptDate=o=>offsetToDate(receiptOffset(o));
function addDays(ds,n){const d=new Date(ds+"T12:00:00Z");d.setUTCDate(d.getUTCDate()+n);return d.toISOString().split("T")[0];}
function fmtDate(ds){return new Date(ds+"T12:00:00Z").toLocaleDateString("en-GB",{day:"2-digit",month:"short"});}
function calcStatus(oh,base){const d=base.avgDemand>0?oh/base.avgDemand:0;if(oh<=0)return"Stockout";if(d<MIN_DAYS)return"Low Stock";if(d>MAX_DAYS)return"Overstock";return"Healthy";}
function willStockout(base,orders){
  // returns true if stock hits zero at any point in the 28-day horizon
  const rel=orders.filter(o=>o.sku===base.sku&&o.include&&o.status!=="On Hold");
  let stock=base.onHand;
  for(let i=0;i<PLAN_DAYS;i++){
    const rec=rel.filter(o=>receiptOffset(o)===i).reduce((s,o)=>s+o.qty,0);
    stock=stock+rec-base.avgDemand;
    if(stock<=0)return true;
  }
  return false;
}
function computeLoad(orders){const load={};orders.forEach(o=>{const s=dayOffset(o.packDate),days=prodDays(o.qty,o.line),daily=o.qty/days;for(let i=0;i<days;i++){const k=`${o.line}:${s+i}`;load[k]=(load[k]||0)+daily;}});return load;}
function buildProjection(base,orders,days=PLAN_DAYS){
  const rel=orders.filter(o=>o.sku===base.sku&&o.include&&o.status!=="On Hold");
  let stock=base.onHand;
  return Array.from({length:days},(_,i)=>{
    const receipts=rel.filter(o=>receiptOffset(o)===i).reduce((s,o)=>s+o.qty,0);
    const opening=stock;
    stock=Math.max(0,stock+receipts-base.avgDemand);
    return{day:i,date:offsetToDate(i),opening,receipts,demand:base.avgDemand,closing:stock};
  });
}
function nextId(orders){const ns=orders.map(o=>parseInt(o.id.replace("OL-",""))).filter(n=>!isNaN(n));return`OL-${Math.max(0,...ns)+1}`;}

function StatusBadge({status,small}){const c=SC[status]||{bg:"#1e293b",text:"#94a3b8",dot:"#94a3b8"};return<span style={{background:c.bg,color:c.text,border:`1px solid ${c.dot}33`,borderRadius:4,padding:small?"1px 7px":"3px 10px",fontSize:small?9:11,fontWeight:700,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}><span style={{width:5,height:5,borderRadius:"50%",background:c.dot,flexShrink:0}}/>{status.toUpperCase()}</span>;}
function OrderBadge({status}){const color=OC[status]||"#94a3b8";return<span style={{background:`${color}1a`,color,border:`1px solid ${color}44`,borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{status.toUpperCase()}</span>;}
function StockBar({value,target,warning,width=90}){const sc=target*1.6,fill=Math.min(value/sc,1);let color="#22c55e";if(value<=warning*0.5)color="#ef4444";else if(value<=warning)color="#f97316";else if(value<target)color="#eab308";return<div style={{position:"relative",width,height:5,background:"#1e293b",borderRadius:3}}><div style={{position:"absolute",left:0,top:0,height:"100%",width:`${fill*100}%`,background:color,borderRadius:3}}/>{[[warning/sc,"#f97316"],[target/sc,"#22c55e55"]].map(([p,c],i)=><div key={i} style={{position:"absolute",top:-2,left:`${p*100}%`,width:1,height:9,background:c}}/>)}</div>;}
function ProjChart({rows,base,width=340,height=70}){if(!rows||!rows.length)return null;const vals=rows.map(r=>r.closing),mx=Math.max(...vals,base.target)*1.1,W=width,H=height,px=i=>(i/(rows.length-1))*W,py=v=>H-(v/mx)*H;return<svg width={W} height={H} style={{overflow:"visible",display:"block"}}><line x1={0} y1={py(base.target)} x2={W} y2={py(base.target)} stroke="#22c55e" strokeWidth={1} strokeDasharray="3,3" opacity={0.6}/><line x1={0} y1={py(base.warning)} x2={W} y2={py(base.warning)} stroke="#f97316" strokeWidth={1} strokeDasharray="2,3" opacity={0.5}/>{rows.map((r,i)=>r.receipts>0&&<line key={i} x1={px(i)} y1={H} x2={px(i)} y2={py(r.closing)} stroke="#22c55e" strokeWidth={2} opacity={0.35}/>)}<polyline points={vals.map((v,i)=>`${px(i)},${py(v)}`).join(" ")} fill="none" stroke="#38bdf8" strokeWidth={2}/>{rows.map((r,i)=>r.closing<=base.warning&&<circle key={i} cx={px(i)} cy={py(r.closing)} r={2.5} fill="#ef4444"/>)}<circle cx={px(rows.length-1)} cy={py(vals[vals.length-1])} r={3} fill="#38bdf8"/></svg>;}

// ── GANTT ─────────────────────────────────────────────────────────────────────
function GanttBoard({orders,onMove,onSelect,selectedId}){
  const dragRef=useRef(null);
  const DAY_W=32,ROW_H=30,LABEL_W=115;
  const days=Array.from({length:PLAN_DAYS},(_,i)=>i);
  const vis=useMemo(()=>orders.filter(o=>o.status!=="On Hold").sort((a,b)=>dayOffset(a.packDate)-dayOffset(b.packDate)),[orders]);
  const load=useMemo(()=>computeLoad(vis),[vis]);
  const LINES=["Line_Rapido","Line_Insulat","Line_Mixed"];
  function onMouseDown(e,oid){
    e.preventDefault();
    const startX=e.clientX,orig=dayOffset(orders.find(o=>o.id===oid).packDate);
    dragRef.current={oid,startX,orig};
    const onMove2=ev=>{dragRef.current.newOff=Math.max(0,orig+Math.round((ev.clientX-startX)/DAY_W));};
    const onUp=()=>{if(dragRef.current?.newOff!=null)onMove(oid,offsetToDate(dragRef.current.newOff));dragRef.current=null;window.removeEventListener("mousemove",onMove2);window.removeEventListener("mouseup",onUp);};
    window.addEventListener("mousemove",onMove2);window.addEventListener("mouseup",onUp);
  }
  const lc=p=>p>1?"#ef4444":p>0.8?"#f97316":p>0.5?"#eab308":"#22c55e";
  return<div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:10,overflow:"hidden"}}>
    <div style={{padding:"8px 16px",borderBottom:"1px solid #1a2740",display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:11,fontWeight:800,color:"#e2e8f0"}}>3 PRODUCTION LINES</span>
      {LINES.map(l=><span key={l} style={{fontSize:10,color:"#4a6080"}}>{l.replace("Line_","")}: <b style={{color:"#e2e8f0"}}>{LINE_CAPS[l].toLocaleString()}</b> u/day</span>)}
      <div style={{marginLeft:"auto",display:"flex",gap:10}}>{Object.entries(TREAT_COLOR).map(([t,c])=><span key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#64748b"}}><span style={{width:10,height:10,borderRadius:2,background:c,display:"inline-block"}}/>{t}</span>)}</div>
    </div>
    <div style={{overflowX:"auto"}}><div style={{minWidth:LABEL_W+PLAN_DAYS*DAY_W+20}}>
      <div style={{display:"flex",position:"sticky",top:0,zIndex:5,background:"#060c18",borderBottom:"1px solid #1a2740"}}>
        <div style={{width:LABEL_W,flexShrink:0,padding:"5px 10px",fontSize:9,color:"#334155",fontWeight:700}}>ORDER</div>
        {days.map(i=>{const ds=offsetToDate(i),d=new Date(ds+"T12:00:00Z"),we=d.getUTCDay()===0||d.getUTCDay()===6;return<div key={i} style={{width:DAY_W,flexShrink:0,textAlign:"center",fontSize:9,color:i===0?"#38bdf8":we?"#334155":"#4a6080",fontWeight:i===0?800:400,borderLeft:"1px solid #0f1a2e",padding:"3px 0"}}>{i%2===0&&<>{d.getUTCDate()}<br/><span style={{fontSize:7,opacity:0.6}}>{d.toLocaleDateString("en",{month:"short"})}</span></>}</div>;})}
      </div>
      {LINES.map(ln=>{const cap=LINE_CAPS[ln];return<div key={ln} style={{display:"flex",borderBottom:"1px solid #1a2740",background:"#06090f"}}>
        <div style={{width:LABEL_W,flexShrink:0,padding:"2px 10px",fontSize:9,color:"#4a6080",fontWeight:700,display:"flex",alignItems:"center"}}>{ln.replace("Line_","")}</div>
        {days.map(i=>{const u=load[`${ln}:${i}`]||0,p=Math.min(u/cap,1.05);return<div key={i} title={`${Math.round(u).toLocaleString()}/${cap.toLocaleString()} (${Math.round(p*100)}%)`} style={{width:DAY_W,flexShrink:0,borderLeft:"1px solid #0a0f1a",padding:"2px 2px",display:"flex",alignItems:"flex-end",height:20}}><div style={{width:"100%",height:`${Math.min(p,1)*100}%`,minHeight:u>0?2:0,background:lc(p),borderRadius:"2px 2px 0 0",opacity:0.85}}/></div>;})}
      </div>;})}
      {vis.map((o,ri)=>{const start=dayOffset(o.packDate),dur=prodDays(o.qty,o.line),end=start+dur-1,rcpt=receiptOffset(o),color=TREAT_COLOR[o.treatment]||"#64748b";
        return<div key={o.id} style={{display:"flex",alignItems:"center",borderBottom:"1px solid #0c1520",background:selectedId===o.id?"#0d1e36":ri%2===0?"#080e1c":"#060c18",cursor:"pointer"}} onClick={()=>onSelect(o.id===selectedId?null:o.id)}>
          <div style={{width:LABEL_W,flexShrink:0,padding:"3px 10px"}}><div style={{fontSize:10,fontWeight:700,color:o.userCreated?"#4ade80":color,fontFamily:"'Courier New',monospace"}}>{o.id}</div><div style={{fontSize:8,color:"#4a6080"}}>{o.sku}</div></div>
          <div style={{position:"relative",flex:1,height:ROW_H,display:"flex"}}>
            {days.map(i=><div key={i} style={{width:DAY_W,flexShrink:0,borderLeft:"1px solid #0a0f1a",height:"100%"}}/>)}
            {start<PLAN_DAYS&&<div onMouseDown={e=>{if(o.status!=="In Transit")onMouseDown(e,o.id);}} style={{position:"absolute",left:start*DAY_W,top:5,height:16,width:Math.min(dur,PLAN_DAYS-start)*DAY_W-2,background:o.status==="Delayed"?"#7f1d1d":`${color}cc`,border:`1.5px solid ${selectedId===o.id?color:color+"88"}`,borderRadius:4,cursor:o.status==="In Transit"?"default":"grab",display:"flex",alignItems:"center",paddingLeft:4,overflow:"hidden",userSelect:"none",zIndex:2}}><span style={{fontSize:8,color:"#fff",fontWeight:700,whiteSpace:"nowrap"}}>{o.qty.toLocaleString()}u{o.status==="Delayed"?" ⚠":""}</span></div>}
            {end<PLAN_DAYS&&rcpt<PLAN_DAYS&&<div style={{position:"absolute",left:(end+1)*DAY_W,top:12,width:(rcpt-end-1)*DAY_W,height:3,background:`${color}44`,zIndex:1}}/>}
            {rcpt<PLAN_DAYS&&rcpt>=0&&<div style={{position:"absolute",left:rcpt*DAY_W+DAY_W/2-4,top:6,width:8,height:14,background:color,borderRadius:2,zIndex:3,opacity:0.9}}/>}
          </div>
        </div>;})}
    </div></div>
    <div style={{padding:"6px 16px",borderTop:"1px solid #1a2740",fontSize:10,color:"#334155"}}>Bar=production · Line=transit · Marker=receipt · Drag to reschedule</div>
  </div>;
}

// ── CREATE ORDER MODAL ────────────────────────────────────────────────────────
function CreateOrderModal({onClose,onSubmit,orders,inventory,prefill}){
  const[country,setCountry]=useState(prefill?.country||"");
  const[treat,setTreat]=useState(prefill?.treatment||"");
  const[qty,setQty]=useState(prefill?.qty||"");
  const[packDate,setPackDate]=useState(PLAN_START);
  const[status,setStatus]=useState("Planned");
  const[notes,setNotes]=useState(prefill?.notes||"");
  const[done,setDone]=useState(false);
  const sku=country&&treat?`${country}-${treat.toUpperCase()}`:null;
  const base=sku?inventory.find(i=>i.sku===sku):null;
  const qn=parseInt(qty)||0;
  const line=treat?TREAT_LINE[treat]:null;
  const pd=qn>0&&line?prodDays(qn,line):0;
  const finDate=pd>0?addDays(packDate,pd-1):null;
  const rcpt=finDate?addDays(finDate,TRANSIT_DAYS+1):null;
  const toTarget=base?Math.max(0,base.target-base.onHand):0;
  const projOH=base&&qn>0?base.onHand+qn:null;
  const afterSt=projOH!=null?calcStatus(projOH,base):null;
  function submit(){if(!country||!treat||!qn)return;const id=nextId(orders);onSubmit({id,country,treatment:treat,sku:`${country}-${treat.toUpperCase()}`,line:TREAT_LINE[treat],packDate,qty:qn,status,notes,include:1,userCreated:true});setDone(true);setTimeout(onClose,600);}

  const lbl={fontSize:10,color:"#4a6080",fontWeight:700,textTransform:"uppercase",display:"block",marginBottom:4};

    <div style={{background:"#0b1221",border:"1px solid #1a2740",borderRadius:12,width:"100%",maxWidth:600,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 32px 96px rgba(0,0,0,0.7)"}}>
      <div style={{padding:"16px 22px",borderBottom:"1px solid #1a2740",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080e1c",borderRadius:"12px 12px 0 0"}}>
        <div><div style={{fontSize:14,fontWeight:800,color:"#e2e8f0"}}>+ Create Production Order</div>{pd>0&&<div style={{fontSize:11,color:"#4a6080",marginTop:2}}>Prod: {pd}d · Transit: {TRANSIT_DAYS+1}d · Total: {pd+TRANSIT_DAYS+1}d</div>}</div>
        <button onClick={onClose} style={{background:"#1e293b",border:"none",color:"#64748b",cursor:"pointer",width:28,height:28,borderRadius:5,fontSize:16}}>×</button>
      </div>
      <div style={{padding:22,display:"flex",flexDirection:"column",gap:16}}>
        {prefill?.notes&&<div style={{background:"#181408",border:"1px solid #eab30840",borderRadius:8,padding:"10px 14px",fontSize:11,color:"#94a3b8",lineHeight:1.6}}><span style={{color:"#eab308",fontWeight:700}}>⚡ </span>{prefill.notes}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>Country</label><select value={country} onChange={e=>setCountry(e.target.value)} style={fld}><option value="">— Select —</option>{Object.entries(COUNTRIES).map(([k,v])=><option key={k} value={k}>{k} — {v}</option>)}</select></div>
          <div><label style={lbl}>Treatment</label><select value={treat} onChange={e=>setTreat(e.target.value)} style={fld}><option value="">— Select —</option><option value="Rapido">Rapido · 12k/day</option><option value="Insulat">Insulat · 9k/day</option><option value="Mixed">Mixed · 7k/day</option></select></div>
        </div>
        {base&&<div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:6,padding:"9px 12px",display:"flex",gap:14,flexWrap:"wrap"}}>
          <div><div style={lbl}>On Hand</div><div style={{fontSize:13,fontWeight:800,color:"#38bdf8",fontFamily:"'Courier New',monospace"}}>{base.onHand.toLocaleString()}</div></div>
          <div><div style={lbl}>Days Cover</div><div style={{fontSize:13,fontWeight:800,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{Math.round(base.onHand/base.avgDemand)}d</div></div>
          <div><div style={lbl}>Target</div><div style={{fontSize:13,fontWeight:800,color:"#22c55e",fontFamily:"'Courier New',monospace"}}>{base.target.toLocaleString()}</div></div>
          <div><div style={lbl}>Status</div><StatusBadge status={calcStatus(base.onHand,base)} small/></div>
        </div>}
        <div><label style={lbl}>Quantity</label>
          <div style={{display:"flex",gap:8}}>
            <input type="number" min={1} value={qty} onChange={e=>setQty(e.target.value)} style={{...fld,flex:1}}/>
            {toTarget>0&&<button onClick={()=>setQty(String(toTarget))} style={{background:"#0d1e36",border:"1px solid #2563eb44",color:"#60a5fa",borderRadius:6,padding:"8px 12px",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>↑ {toTarget.toLocaleString()}</button>}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>Production Start</label><input type="date" value={packDate} onChange={e=>setPackDate(e.target.value)} style={fld}/></div>
          <div><label style={lbl}>Status</label><select value={status} onChange={e=>setStatus(e.target.value)} style={fld}><option value="Planned">Planned</option><option value="Released">Released</option></select></div>
        </div>
        {pd>0&&rcpt&&<div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:6,padding:"9px 12px",display:"flex",gap:16,flexWrap:"wrap"}}>
          <div><div style={lbl}>Production</div><div style={{fontSize:11,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{fmtDate(packDate)} → {fmtDate(finDate)} ({pd}d)</div></div>
          <div><div style={lbl}>Receipt in Country</div><div style={{fontSize:11,color:"#22c55e",fontWeight:700,fontFamily:"'Courier New',monospace"}}>{fmtDate(rcpt)}</div></div>
        </div>}
        {base&&qn>0&&<div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:6,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:10,color:"#4a6080",textTransform:"uppercase",fontWeight:700}}>Impact</span><div style={{display:"flex",gap:8,alignItems:"center"}}><StatusBadge status={calcStatus(base.onHand,base)} small/><span style={{color:"#334155"}}>→</span><StatusBadge status={afterSt} small/></div></div>
          <div style={{fontSize:11,color:"#64748b"}}>{base.onHand.toLocaleString()} → <b style={{color:SC[afterSt]?.text||"#e2e8f0"}}>{projOH.toLocaleString()}</b> units</div>
        </div>}
        <div><label style={lbl}>Notes</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} style={{...fld,resize:"vertical",lineHeight:1.6,fontSize:12}}/></div>
      </div>
      <div style={{padding:"12px 22px",borderTop:"1px solid #1a2740",display:"flex",justifyContent:"flex-end",gap:10,background:"#080e1c",borderRadius:"0 0 12px 12px"}}>

      </div>
    </div>
  </div>;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({inventory,orders,onCreateOrder}){
  const stockouts=inventory.filter(i=>i.status==="Stockout");
  const lowstock=inventory.filter(i=>i.status==="Low Stock");
  const alerts=[...stockouts,...lowstock];
  const overstock=inventory.filter(i=>i.status==="Overstock");
  const healthy=inventory.filter(i=>i.status==="Healthy");
  const delayed=orders.filter(o=>o.status==="Delayed");
  const onHold=orders.filter(o=>o.status==="On Hold");
  return<div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
      {[{l:"Stockout",v:stockouts.length,c:"#ef4444",bg:"#1a0505"},{l:"Low Stock",v:lowstock.length,c:"#f97316",bg:"#1a0e05"},{l:"Overstock >45d",v:overstock.length,c:"#eab308",bg:"#161205"},{l:"Healthy",v:healthy.length,c:"#22c55e",bg:"#051a0d"},{l:"Delayed Orders",v:delayed.length,c:"#f97316",bg:"#1a0e05"},{l:"On Hold",v:onHold.length,c:"#ef4444",bg:"#1a0505"},{l:"Planner Orders",v:orders.filter(o=>o.userCreated).length,c:"#38bdf8",bg:"#05121a"}].map(k=>(
        <div key={k.l} style={{background:k.bg,border:`1px solid ${k.c}2a`,borderRadius:8,padding:"12px 18px",flex:"1 1 110px"}}>
          <div style={{fontSize:9,color:"#4a6080",fontWeight:700,textTransform:"uppercase",marginBottom:5}}>{k.l}</div>
          <div style={{fontSize:28,fontWeight:800,color:k.c,fontFamily:"'Courier New',monospace"}}>{k.v}</div>
        </div>))}
    </div>
    {alerts.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* Stockout — critical red */}
      {alerts.filter(i=>i.status==="Stockout").length>0&&<div style={{background:"#0b1221",border:"1px solid #ef444440",borderRadius:10,overflow:"hidden"}}>
        <div style={{background:"#1a0505",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #2b0d0d"}}>
          <span style={{fontSize:11,color:"#ef4444",fontWeight:700}}>🚨 {alerts.filter(i=>i.status==="Stockout").length} STOCKOUT — {alerts.filter(i=>i.futureStockout).length>0?"PROJECTED WITHIN 28 DAYS":"ZERO STOCK"} — URGENT ACTION REQUIRED</span>
          <button onClick={()=>onCreateOrder(null)} style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Emergency Order</button>
        </div>
        <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
          {alerts.filter(i=>i.status==="Stockout").map(i=>{const suggested=Math.max(0,i.target-i.onHand),dc=Math.round(i.onHand/i.avgDemand);
            return<div key={i.sku} style={{background:"#080e1c",border:"1px solid #ef444430",borderRadius:8,padding:"12px 14px",flex:"1 1 200px",minWidth:200}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:800,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{i.sku}</span>
                <StatusBadge status={i.status} small/>
              </div>
              <div style={{fontSize:10,color:"#4a6080",marginBottom:5}}>{COUNTRIES[i.country]} · {i.treatment} · <b style={{color:"#ef4444"}}>{dc}d cover{i.futureStockout?" · projected stockout":""}</b></div>
              <StockBar value={i.onHand} target={i.target} warning={i.warning} width="100%"/>
              <div style={{fontSize:10,color:"#64748b",marginTop:5,display:"flex",justifyContent:"space-between",fontFamily:"'Courier New',monospace"}}>
                <span>On hand: <b style={{color:"#e2e8f0"}}>{i.onHand.toLocaleString()}</b></span>
                <span>Target: <b style={{color:"#22c55e"}}>{i.target.toLocaleString()}</b></span>
              </div>
              <button onClick={()=>onCreateOrder({country:i.country,treatment:i.treatment,qty:String(suggested),notes:`🚨 STOCKOUT — ${i.sku} at ${dc}d cover. Immediate order needed: ${suggested.toLocaleString()} units.`})} style={{marginTop:9,width:"100%",background:"#2b0d0d",border:"1px solid #ef444444",color:"#ef4444",padding:"6px 0",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                🚨 Order {suggested.toLocaleString()} units NOW
              </button>
            </div>;})}
        </div>
      </div>}
      {/* Low Stock — orange warning */}
      {alerts.filter(i=>i.status==="Low Stock").length>0&&<div style={{background:"#0b1221",border:"1px solid #f9731630",borderRadius:10,overflow:"hidden"}}>
        <div style={{background:"#12080a",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a2030"}}>
          <span style={{fontSize:11,color:"#f97316",fontWeight:700}}>⚠ {alerts.filter(i=>i.status==="Low Stock").length} SKUs BELOW {MIN_DAYS}-DAY MINIMUM</span>
          <button onClick={()=>onCreateOrder(null)} style={{background:"linear-gradient(135deg,#dc2626,#7c3aed)",border:"none",color:"#fff",padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Create Order</button>
        </div>
        <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
          {alerts.filter(i=>i.status==="Low Stock").map(i=>{const suggested=Math.max(0,i.target-i.onHand),dc=Math.round(i.onHand/i.avgDemand);
            return<div key={i.sku} style={{background:"#080e1c",border:"1px solid #f9731630",borderRadius:8,padding:"12px 14px",flex:"1 1 200px",minWidth:200}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:800,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{i.sku}</span>
                <StatusBadge status={i.status} small/>
              </div>
              <div style={{fontSize:10,color:"#4a6080",marginBottom:5}}>{COUNTRIES[i.country]} · {i.treatment} · <b style={{color:"#f97316"}}>{dc}d cover</b></div>
              <StockBar value={i.onHand} target={i.target} warning={i.warning} width="100%"/>
              <div style={{fontSize:10,color:"#64748b",marginTop:5,display:"flex",justifyContent:"space-between",fontFamily:"'Courier New',monospace"}}>
                <span>On hand: <b style={{color:"#e2e8f0"}}>{i.onHand.toLocaleString()}</b></span>
                <span>Target: <b style={{color:"#22c55e"}}>{i.target.toLocaleString()}</b></span>
              </div>
              <button onClick={()=>onCreateOrder({country:i.country,treatment:i.treatment,qty:String(suggested),notes:`Fix ${i.status} — ${i.sku} at ${dc}d cover. Suggested ${suggested.toLocaleString()} units.`})} style={{marginTop:9,width:"100%",background:"#0d1e36",border:"1px solid #2563eb44",color:"#60a5fa",padding:"6px 0",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                + Order {suggested.toLocaleString()} units
              </button>
            </div>;})}
        </div>
      </div>}
    </div>}
    {overstock.length>0&&<div style={{background:"#0b1221",border:"1px solid #eab30830",borderRadius:10,overflow:"hidden"}}>
      <div style={{background:"#0e0e06",padding:"10px 16px",borderBottom:"1px solid #1a1a0a"}}>
        <span style={{fontSize:11,color:"#eab308",fontWeight:700}}>📦 {overstock.length} SKUs ABOVE {MAX_DAYS}-DAY MAXIMUM (Overstock)</span>
      </div>
      <div style={{padding:14,display:"flex",flexWrap:"wrap",gap:10}}>
        {overstock.map(i=>{const dc=Math.round(i.onHand/i.avgDemand),excess=i.onHand-i.avgDemand*MAX_DAYS;
          return<div key={i.sku} style={{background:"#080e1c",border:"1px solid #eab30830",borderRadius:8,padding:"12px 14px",flex:"1 1 200px",minWidth:200}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <span style={{fontSize:13,fontWeight:800,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{i.sku}</span>
              <StatusBadge status="Overstock" small/>
            </div>
            <div style={{fontSize:10,color:"#4a6080",marginBottom:5}}>{COUNTRIES[i.country]} · {i.treatment} · <b style={{color:"#eab308"}}>{dc}d cover</b></div>
            <StockBar value={i.onHand} target={i.target} warning={i.warning} width="100%"/>
            <div style={{fontSize:10,color:"#64748b",marginTop:5,display:"flex",justifyContent:"space-between",fontFamily:"'Courier New',monospace"}}>
              <span>On hand: <b style={{color:"#eab308"}}>{i.onHand.toLocaleString()}</b></span>
              <span>Excess: <b style={{color:"#eab308"}}>+{excess.toLocaleString()}</b></span>
            </div>
            <div style={{marginTop:7,fontSize:10,color:"#64748b",background:"#0e0e06",borderRadius:4,padding:"5px 8px",border:"1px solid #eab30820"}}>
              Consider delaying next order by <b style={{color:"#eab308"}}>{Math.round(excess/i.avgDemand)}d</b>
            </div>
          </div>;})}
      </div>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
      {Object.entries(COUNTRIES).map(([code,name])=>{
        const inv=inventory.filter(i=>i.country===code);
        const lowCount=inv.filter(i=>i.status==="Low Stock"||i.status==="Stockout").length;
        const overCount=inv.filter(i=>i.status==="Overstock").length;
        const total=inv.reduce((s,i)=>s+i.onHand,0);
        const avgDos=inv.length>0?Math.round(inv.reduce((s,i)=>s+i.onHand/i.avgDemand,0)/inv.length):0;
        const borderColor=lowCount>0?"#f9731630":overCount>0?"#eab30830":"#1a2740";
        return<div key={code} style={{background:"#0b1221",border:`1px solid ${borderColor}`,borderRadius:8,padding:"12px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div style={{fontSize:19,fontWeight:800,color:"#e2e8f0",fontFamily:"'Courier New',monospace"}}>{code}</div><div style={{fontSize:10,color:"#4a6080"}}>{name}</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
              {lowCount>0&&<span style={{background:"#f9731615",color:"#f97316",border:"1px solid #f9731630",borderRadius:4,fontSize:9,fontWeight:700,padding:"2px 6px"}}>{lowCount}⚠ low</span>}
              {overCount>0&&<span style={{background:"#eab30815",color:"#eab308",border:"1px solid #eab30830",borderRadius:4,fontSize:9,fontWeight:700,padding:"2px 6px"}}>{overCount}↑ over</span>}
            </div>
          </div>
          <div style={{marginTop:8,fontSize:10,color:"#64748b"}}>On hand: <span style={{color:"#e2e8f0",fontWeight:700,fontFamily:"'Courier New',monospace"}}>{total.toLocaleString()}</span></div>
          <div style={{fontSize:10,color:"#64748b"}}>Avg cover: <span style={{color:avgDos<MIN_DAYS?"#f97316":avgDos>MAX_DAYS?"#eab308":"#22c55e",fontWeight:700,fontFamily:"'Courier New',monospace"}}>{avgDos}d</span></div>
        </div>;})}
    </div>
  </div>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS=[{id:"dashboard",label:"Dashboard",icon:"◈"},{id:"planning",label:"Planning",icon:"▦"},{id:"projection",label:"Projection",icon:"∿"},{id:"orders",label:"Orders",icon:"⊞"}];

function App(){
  const[tab,setTab]=useState("dashboard");
  const[orders,setOrders]=useState(INITIAL_ORDERS);
  const[baseInv,setBaseInv]=useState(BASE_INV);
  const[modal,setModal]=useState(false);
  const[prefill,setPrefill]=useState(null);
  const[toast,setToast]=useState(null);
  const[ganttSel,setGanttSel]=useState(null);
  const[loading,setLoading]=useState(true);
  const[dataSource,setDataSource]=useState("fallback");

  // ALL hooks must be before any conditional return
  const inventory=useMemo(()=>baseInv.map(base=>{
    const extra=orders.filter(o=>o.sku===base.sku&&o.userCreated&&o.include&&o.status!=="On Hold").reduce((s,o)=>s+o.qty,0);
    const oh=base.onHand+extra;
    const baseWithOH={...base,onHand:oh};
    const snapStatus=calcStatus(oh,base);
    const futureStockout=snapStatus!=="Overstock"&&snapStatus!=="Stockout"&&willStockout(baseWithOH,orders);
    const status=futureStockout?"Stockout":snapStatus;
    return{...baseWithOH,status,futureStockout};
  }),[baseInv,orders]);

  useEffect(function(){
    window.VMI_PRELOAD.then(function(data){
      if(data && data.baseInv && data.baseInv.length>0){
        setBaseInv(data.baseInv);
        setOrders(data.orders);
        setDataSource("google_sheets");
        setToast("✓ Live data loaded from Google Sheets");
        setTimeout(function(){setToast(null);},3000);
      } else {
        setDataSource("fallback");
      }
      setLoading(false);
    });
  },[]);

  useEffect(function(){
    var el=document.getElementById("vmi-state");
    if(!el){el=document.createElement("script");el.id="vmi-state";el.type="application/json";document.body.appendChild(el);}
    el.textContent=JSON.stringify({inventory,orders});
  },[inventory,orders]);

  function handleReload(){window.location.reload();}
  function openModal(pf){setPrefill(pf||null);setModal(true);}
  function handleSubmit(order){setOrders(p=>[order,...p]);setToast("✓ "+order.id+" created — "+order.sku+" · "+order.qty.toLocaleString()+" units");setTimeout(function(){setToast(null);},5000);}
  function handleMove(oid,newDate){setOrders(p=>p.map(o=>o.id!==oid?o:{...o,packDate:newDate}));setToast("↔ "+oid+" rescheduled to "+fmtDate(newDate));setTimeout(function(){setToast(null);},4000);}
  function handleDelete(oid){if(oid==="ALL"){setOrders(p=>p.filter(o=>!o.userCreated));setToast("🗑 All planner orders removed");}else{setOrders(p=>p.filter(o=>o.id!==oid));setToast("🗑 "+oid+" deleted");}setTimeout(function(){setToast(null);},4000);}
  const newCount=orders.filter(o=>o.userCreated).length;

  if(loading) return <div style={{minHeight:"100vh",background:"#060c18",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
    <div style={{width:36,height:36,border:"3px solid #1a2740",borderTop:"3px solid #3b82f6",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
    <div style={{color:"#4a6080",fontSize:13}}>Loading plan from Google Sheets…</div>
    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
  </div>;

  const newCount=orders.filter(o=>o.userCreated).length;

  return<div style={{minHeight:"100vh",background:"#060c18",color:"#e2e8f0",fontFamily:"'IBM Plex Mono','Courier New',monospace"}}>
    {toast&&<div style={{position:"fixed",bottom:24,right:24,zIndex:300,background:"#052010",border:"1px solid #4ade8040",borderRadius:8,padding:"12px 18px",fontSize:12,color:"#4ade80",fontWeight:700,boxShadow:"0 8px 32px rgba(0,0,0,0.5)",maxWidth:420}}>{toast}</div>}
    <div style={{background:"#080e1c",borderBottom:"1px solid #1a2740",padding:"0 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
      <div style={{padding:"12px 0",display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:26,height:26,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>⬡</div>
        <div>
          <div style={{fontSize:12,fontWeight:800,color:"#f1f5f9"}}>VMI Control Tower</div>
          <div style={{fontSize:8,color:"#334155",fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Insulin Supply Chain · Policy: {MIN_DAYS}/{TARGET_DAYS}/{MAX_DAYS}d</div>
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginLeft:12}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"#0b1221":"none",border:"none",color:tab===t.id?"#e2e8f0":"#4a6080",padding:"12px 14px",fontSize:11,fontWeight:tab===t.id?700:500,cursor:"pointer",borderBottom:tab===t.id?"2px solid #3b82f6":"2px solid transparent",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
          <span style={{opacity:0.7}}>{t.icon}</span>{t.label}
          {t.id==="orders"&&newCount>0&&<span style={{background:"#22c55e",color:"#000",borderRadius:10,fontSize:8,fontWeight:800,padding:"1px 5px"}}>{newCount}</span>}
        </button>)}
      </div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={handleReload} title="Reload from Google Sheets" style={{background:"#0b1221",border:"1px solid #1a2740",color:"#4a6080",padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↺ Reload</button>
        <span style={{fontSize:9,color:dataSource==="google_sheets"?"#22c55e":"#4a6080",fontWeight:700,textTransform:"uppercase",display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:dataSource==="google_sheets"?"#22c55e":"#4a6080",display:"inline-block"}}/>
          {dataSource==="google_sheets"?"Live":"Fallback"}
        </span>
        <button onClick={()=>openModal(null)} style={{background:"linear-gradient(135deg,#1d4ed8,#4f46e5)",border:"none",color:"#fff",padding:"7px 18px",borderRadius:6,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Create Order</button>
        <div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px #22c55e"}}/>
      </div>
    </div>
    <div style={{padding:20}}>
      {tab==="dashboard"&&<Dashboard inventory={inventory} orders={orders} onCreateOrder={openModal}/>}
      {tab==="orders"&&<OrdersView orders={orders} onCreateOrder={openModal} onDeleteOrder={handleDelete}/>}
      {tab==="projection"&&<ProjectionView orders={orders} baseInv={BASE_INV}/>}
      {tab==="planning"&&<div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div><div style={{fontSize:14,fontWeight:800,color:"#e2e8f0",marginBottom:3}}>Production Planning Board</div><div style={{fontSize:11,color:"#4a6080"}}>3 separate lines · Drag bars to reschedule</div></div>
          <button onClick={()=>openModal(null)} style={{background:"linear-gradient(135deg,#1d4ed8,#4f46e5)",border:"none",color:"#fff",padding:"7px 18px",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Add Order</button>
        </div>
        <GanttBoard orders={orders} onMove={handleMove} onSelect={setGanttSel} selectedId={ganttSel}/>
        {ganttSel&&(()=>{const sel=orders.find(o=>o.id===ganttSel);if(!sel)return null;const base=baseInv.find(b=>b.sku===sel.sku);if(!base)return null;const rows=buildProjection(base,orders);
          return<div style={{background:"#080e1c",border:"1px solid #1a2740",borderRadius:10,padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:12,fontWeight:800,color:TREAT_COLOR[sel.treatment]||"#38bdf8",fontFamily:"'Courier New',monospace"}}>{sel.id} — {sel.sku} · {sel.qty.toLocaleString()} units</span>
              <StatusBadge status={calcStatus(base.onHand,base)} small/>
            </div>
            <ProjChart rows={rows} base={base} width={Math.max(500,PLAN_DAYS*22)} height={80}/>
          </div>;})()}
      </div>}
    </div>
    {modal&&<CreateOrderModal onClose={()=>setModal(false)} onSubmit={handleSubmit} orders={orders} inventory={inventory} prefill={prefill}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ── VMI API — callable by Make.com via Browserbase JS execution ──────────
     Usage: await window.VMI_API.getSnapshot()
     Returns JSON with full inventory state, alerts, and orders
─────────────────────────────────────────────────────────────────────────── -->
<script>
window.VMI_API = {

  // GET /snapshot — full inventory + alerts + orders
  getSnapshot: function() {
    const MIN_DAYS = 15, MAX_DAYS = 45, TARGET_DAYS = 30, TRANSIT_DAYS = 2;
    const LINE_CAPS = {Line_Rapido:12000, Line_Insulat:9000, Line_Mixed:7000};
    const COUNTRIES = {DK:"Denmark",SE:"Sweden",NO:"Norway",FI:"Finland",DE:"Germany",NL:"Netherlands",BE:"Belgium",FR:"France",ES:"Spain",IT:"Italy"};

    // Pull live state from React (includes any planner orders added)
    const rootFiber = document.getElementById("root")._reactRootContainer ||
                      document.getElementById("root")["_reactRootContainer"];

    // Read current orders from the DOM data attribute (set by App on each render)
    const stateEl = document.getElementById("vmi-state");
    const state = stateEl ? JSON.parse(stateEl.textContent) : null;

    const inv   = state ? state.inventory : [];
    const orders = state ? state.orders   : [];

    const alerts = inv.filter(i => i.status === "Stockout" || i.status === "Low Stock")
                      .map(i => ({
                        sku:          i.sku,
                        country:      i.country,
                        country_name: COUNTRIES[i.country],
                        treatment:    i.treatment,
                        on_hand:      i.onHand,
                        avg_demand:   i.avgDemand,
                        days_cover:   Math.round(i.onHand / i.avgDemand),
                        status:       i.status,
                        future_stockout: i.futureStockout || false,
                        target_qty:   i.target,
                        suggested_order_qty: Math.max(0, i.target - i.onHand),
                        line:         i.line
                      }));

    const overstock = inv.filter(i => i.status === "Overstock")
                         .map(i => ({
                           sku: i.sku, country: i.country,
                           days_cover: Math.round(i.onHand / i.avgDemand),
                           excess_units: i.onHand - i.avgDemand * MAX_DAYS
                         }));

    return {
      snapshot_date:  "2026-03-12",
      policy:         { min_days: MIN_DAYS, target_days: TARGET_DAYS, max_days: MAX_DAYS, transit_days: TRANSIT_DAYS },
      line_capacities: LINE_CAPS,
      summary: {
        total_skus:    inv.length,
        stockouts:     inv.filter(i=>i.status==="Stockout").length,
        low_stock:     inv.filter(i=>i.status==="Low Stock").length,
        overstock:     inv.filter(i=>i.status==="Overstock").length,
        healthy:       inv.filter(i=>i.status==="Healthy").length,
        delayed_orders: orders.filter(o=>o.status==="Delayed").length,
        on_hold_orders: orders.filter(o=>o.status==="On Hold").length
      },
      alerts,
      overstock,
      delayed_orders: orders.filter(o=>o.status==="Delayed").map(o=>({
        id: o.id, sku: o.sku, qty: o.qty,
        pack_date: o.packDate, status: o.status, notes: o.notes
      })),
      on_hold_orders: orders.filter(o=>o.status==="On Hold").map(o=>({
        id: o.id, sku: o.sku, qty: o.qty, notes: o.notes
      })),
      all_inventory: inv.map(i=>({
        sku: i.sku, country: i.country, treatment: i.treatment,
        on_hand: i.onHand, avg_demand: i.avgDemand,
        days_cover: Math.round(i.onHand/i.avgDemand),
        status: i.status, target: i.target, line: i.line
      }))
    };
  },

  // GET /alerts — just the critical items, ready to paste into Claude prompt
  getAlertsSummary: function() {
    const snap = window.VMI_API.getSnapshot();
    const lines = [];
    snap.alerts.forEach(a => {
      lines.push(`${a.sku}: ${a.on_hand} units on hand, ${a.avg_demand}/day demand = ${a.days_cover}d cover. Status: ${a.status}. Suggested order: ${a.suggested_order_qty} units on ${a.line}.`);
    });
    snap.delayed_orders.forEach(o => {
      lines.push(`DELAYED ORDER ${o.id}: ${o.sku} qty ${o.qty}, pack date ${o.pack_date}. Note: ${o.notes}`);
    });
    snap.on_hold_orders.forEach(o => {
      lines.push(`ON HOLD ${o.id}: ${o.sku} qty ${o.qty}. Note: ${o.notes}`);
    });
    return lines.join("\n");
  },

  // POST /createOrder — called by Browserbase agent to inject an order
  createOrder: function(order) {
    const stateEl = document.getElementById("vmi-state");
    if (!stateEl) return {error: "App not ready"};
    const event = new CustomEvent("vmi:createOrder", {detail: order});
    document.dispatchEvent(event);
    return {success: true, order};
  }

};

// Expose a plain URL-style API via query string for simple HTTP GET from Make.com
// e.g. https://your-app.vercel.app/?api=snapshot
(function(){
  const params = new URLSearchParams(window.location.search);
  const endpoint = params.get("api");
  if (!endpoint) return;
  // Wait for React to mount
  setTimeout(function(){
    let result;
    if (endpoint === "snapshot")       result = window.VMI_API.getSnapshot();
    else if (endpoint === "alerts")    result = {alerts_text: window.VMI_API.getAlertsSummary()};
    else result = {error: "Unknown endpoint. Use ?api=snapshot or ?api=alerts"};

    // Render JSON response over the app
    document.getElementById("root").innerHTML =
      `<pre style="background:#060c18;color:#4ade80;padding:32px;font-family:'Courier New',monospace;font-size:12px;min-height:100vh;margin:0;white-space:pre-wrap;">${JSON.stringify(result, null, 2)}</pre>`;
  }, 800);
})();
</script>
</body>
